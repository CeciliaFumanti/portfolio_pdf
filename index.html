<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio — Visualizza PDF</title>
  <style>
    html,body { height:100%; margin:0; background:#000; }
    .viewer { width:100%; height:100vh; border:0; display:block; }
    .toplink {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 20;
      background: rgba(255,255,255,0.95);
      color: #000;
      padding: 6px 10px;
      border-radius: 6px;
      text-decoration: none;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <a class="toplink" href="Portfolio_Cecilia_Fumanti_2026.pdf" target="_blank" rel="noopener">Apri / Scarica PDF</a>

  <!-- Usa percorso relativo: il file deve essere in docs/ -->
  <iframe class="viewer"
    src="Portfolio_Cecilia_Fumanti_2026.pdf#view=FitH"
    title="Portfolio Cecilia Fumanti 2026">
    <p>Il tuo browser non supporta l'embed dei PDF. Apri direttamente:
      <a href="Portfolio_Cecilia_Fumanti_2026.pdf" target="_blank" rel="noopener">Portfolio_Cecilia_Fumanti_2026.pdf</a>
    </p>
  </iframe>

  <!-- Se vuoi maggiore compatibilità (es. browser vecchi) -> usa PDF.js -->
</body>
</html>
