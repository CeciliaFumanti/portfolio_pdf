<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio — Cecilia Fumanti</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #0f0f11;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    iframe {
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .mobile-fallback {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 20px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      background: radial-gradient(circle at center, #1a1a24 0%, #0f0f11 100%);
    }
    .mobile-fallback h1 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .mobile-fallback p {
      font-size: 16px;
      color: #a0a0ab;
      margin-bottom: 24px;
      max-width: 300px;
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #000000;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover {
      background: #e4e4e7;
    }
    .btn:active {
      transform: scale(0.98);
    }
    /* Rileva i dispositivi touch/mobile per mostrare un fallback ottimale */
    @media (max-width: 768px) {
      iframe {
        display: none;
      }
      .mobile-fallback {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <!-- Iframe che mostra il PDF su Desktop -->
  <iframe
    src="docs/Portfolio_Cecilia_Fumanti_2026.pdf"
    title="Portfolio Cecilia Fumanti 2026">
  </iframe>

  <!-- Fallback per Mobile (dove l'embed dei PDF spesso non funziona o non permette lo scroll) -->
  <div class="mobile-fallback">
    <h1>Portfolio</h1>
    <p>Cecilia Fumanti — 2026</p>
    <a class="btn" href="docs/Portfolio_Cecilia_Fumanti_2026.pdf" target="_blank" rel="noopener">Apri il Portfolio PDF</a>
  </div>

</body>
</html>
