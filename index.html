<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio — Cecilia Fumanti</title>
  
  <!-- Inclusione di PDF.js da CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  
  <!-- Inclusione del foglio di stile ufficiale per il Text Layer di PDF.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf_viewer.min.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111115;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100%;
    }
    
    /* Contenitore principale */
    #viewer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      box-sizing: border-box;
      gap: 24px;
    }

    /* Segnaposto per ciascuna pagina del PDF */
    .page-wrapper {
      position: relative;
      width: 100%;
      max-width: 1000px;
      background: #1e1e24;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.3s ease;
    }

    /* Contenitore interno per allineare perfettamente Canvas e Text Layer */
    .page-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Canvas dove viene disegnato il PDF */
    .page-canvas {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .page-canvas.loaded {
      opacity: 1;
    }

    /* Sovrapposizione del Text Layer per la selezione del testo */
    .textLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      opacity: 1;
      mix-blend-mode: multiply;
      pointer-events: auto;
    }

    /* Rende il testo selezionabile ma trasparente per vedere il canvas sotto */
    .textLayer span {
      color: transparent !important;
      cursor: text;
    }

    /* Animazione di caricamento all'interno di ogni pagina */
    .page-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 1s ease-in-out infinite;
      z-index: 2;
      transition: opacity 0.3s ease;
    }

    .page-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Loader globale iniziale */
    #global-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #111115;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      color: #fff;
      transition: opacity 0.5s ease, visibility 0.5s;
    }

    #global-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin-global 1s ease-in-out infinite;
      margin-bottom: 16px;
    }

    @keyframes spin-global {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loader Iniziale -->
  <div id="global-loader">
    <div class="spinner"></div>
    <div style="font-size: 16px; font-weight: 500; letter-spacing: 0.05em;">Caricamento Portfolio...</div>
  </div>

  <!-- Contenitore in cui verranno renderizzate le pagine -->
  <div id="viewer-container"></div>

  <script>
    // Imposta il worker di PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const pdfUrl = 'docs/Portfolio_Cecilia_Fumanti_2026.pdf';
    const container = document.getElementById('viewer-container');
    const globalLoader = document.getElementById('global-loader');

    // Carica il documento PDF
    pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
      // Nascondi il loader iniziale
      globalLoader.classList.add('hidden');

      const numPages = pdf.numPages;
      const pagesToRender = [];

      // Passaggio 1: Crea i wrapper segnaposto con l'aspect ratio corretto
      pdf.getPage(1).then(firstPage => {
        const viewport = firstPage.getViewport({ scale: 1 });
        const aspectRatio = viewport.height / viewport.width;

        for (let pageNum = 1; pageNum <= numPages; pageNum++) {
          const wrapper = document.createElement('div');
          wrapper.className = 'page-wrapper';
          wrapper.style.aspectRatio = (1 / aspectRatio).toString();
          wrapper.dataset.pageNum = pageNum;

          const loader = document.createElement('div');
          loader.className = 'page-loader';
          wrapper.appendChild(loader);

          // Contenitore interno per Canvas + Text Layer
          const pageContainer = document.createElement('div');
          pageContainer.className = 'page-container';
          wrapper.appendChild(pageContainer);

          const canvas = document.createElement('canvas');
          canvas.className = 'page-canvas';
          pageContainer.appendChild(canvas);

          container.appendChild(wrapper);
          pagesToRender.push({ pageNum, wrapper, pageContainer, canvas, loader, rendered: false });
        }

        // Passaggio 2: Configura l'IntersectionObserver per il caricamento lazy
        const observerOptions = {
          root: null,
          rootMargin: '400px 0px',
          threshold: 0
        };

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const wrapper = entry.target;
              const pageNum = parseInt(wrapper.dataset.pageNum, 10);
              const pageData = pagesToRender.find(p => p.pageNum === pageNum);

              if (pageData && !pageData.rendered) {
                pageData.rendered = true;
                observer.unobserve(wrapper);
                renderPage(pdf, pageData);
              }
            }
          });
        }, observerOptions);

        pagesToRender.forEach(p => {
          observer.observe(p.wrapper);
        });
      });

    }).catch(err => {
      console.error('Errore nel caricamento del PDF:', err);
      globalLoader.innerHTML = '<div style="color: #ff4a4a; text-align: center; padding: 20px;">' +
        '<h3>Errore durante il caricamento del portfolio</h3>' +
        '<p>Assicurati che il file PDF sia presente nella cartella "docs"</p>' +
        '</div>';
    });

    // Funzione per renderizzare una singola pagina su canvas + text layer
    function renderPage(pdf, pageData) {
      pdf.getPage(pageData.pageNum).then(page => {
        const dpr = window.devicePixelRatio || 1;
        const containerWidth = pageData.wrapper.clientWidth || 1000;
        
        const unscaledViewport = page.getViewport({ scale: 1 });
        const baseScale = containerWidth / unscaledViewport.width;
        
        // 1. Rendering del Canvas (con DPR per alta nitidezza)
        const renderScale = baseScale * dpr;
        const viewport = page.getViewport({ scale: renderScale });

        const canvas = pageData.canvas;
        const ctx = canvas.getContext('2d');

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        canvas.style.width = '100%';
        canvas.style.height = 'auto';

        const renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };

        page.render(renderContext).promise.then(() => {
          pageData.loader.classList.add('hidden');
          canvas.classList.add('loaded');

          // 2. Rendering del Text Layer (con scala base del layout CSS)
          const textViewport = page.getViewport({ scale: baseScale });
          
          const textLayerDiv = document.createElement('div');
          textLayerDiv.className = 'textLayer';
          
          pageData.pageContainer.appendChild(textLayerDiv);

          page.getTextContent().then(textContent => {
            pdfjsLib.renderTextLayer({
              textContent: textContent,
              container: textLayerDiv,
              viewport: textViewport,
              textDivs: []
            });
          });
        });
      }).catch(err => {
        console.error('Errore nel rendering della pagina ' + pageData.pageNum, err);
      });
    }
  </script>
</body>
</html>
